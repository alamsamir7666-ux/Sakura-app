name: Build Flutter APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # manual trigger

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run static analysis
        run: flutter analyze --no-fatal-infos || true

      - name: Run tests
        run: flutter test --reporter expanded || true

  build-apk:
    needs: analyze-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (debug)
        run: |
          flutter build apk --debug \
            --dart-define=CLERK_PUBLISHABLE_KEY=${{ secrets.CLERK_PUBLISHABLE_KEY || 'pk_test_placeholder' }} \
            --dart-define=API_BASE_URL=${{ secrets.API_BASE_URL || 'https://envy-enhance-fixed5.vercel.app' }}

      - name: Build APK (release)
        if: ${{ secrets.CLERK_PUBLISHABLE_KEY != '' }}
        run: |
          flutter build apk --release \
            --dart-define=CLERK_PUBLISHABLE_KEY=${{ secrets.CLERK_PUBLISHABLE_KEY }} \
            --dart-define=API_BASE_URL=${{ secrets.API_BASE_URL || 'https://envy-enhance-fixed5.vercel.app' }} \
            --dart-define=FLAVOR=production

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: sakura-beauty-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

      - name: Upload release APK
        if: ${{ secrets.CLERK_PUBLISHABLE_KEY != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: sakura-beauty-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
